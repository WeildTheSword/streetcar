<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><title>Brand · Illustrations</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--cream);}
  body{font-family:var(--font-body);padding:14px 20px;}
  .heading{font-family:var(--font-label);font-weight:500;text-transform:uppercase;letter-spacing:0.4em;font-size:10px;color:var(--brass-deep);margin-bottom:12px;}
  .grid{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;}
  .tile{border:1px solid var(--brass);background:rgba(255,255,255,0.45);aspect-ratio:1/1;display:flex;align-items:center;justify-content:center;padding:10px;}
  .tile img{width:100%;height:100%;object-fit:contain;}
  .cap{font-family:var(--font-label);text-transform:uppercase;letter-spacing:0.25em;font-size:8px;color:var(--brass-deep);text-align:center;margin-top:4px;}
  .desc{font-family:var(--font-body);font-style:italic;font-size:12px;color:var(--muted);margin-top:10px;text-align:center;}
</style></head><body>
<div class="heading">Engraved SVG Illustrations · Line-art / Playbill</div>
<div class="grid">
  <div><div class="tile"><img src="../assets/illustrations/fleur-de-lis.svg" alt="fleur de lis"></div><div class="cap">Fleur-de-Lis</div></div>
  <div><div class="tile"><img src="../assets/illustrations/cathedral.svg" alt="cathedral"></div><div class="cap">Cathedral</div></div>
  <div><div class="tile"><img src="../assets/illustrations/steamboat.svg" alt="steamboat"></div><div class="cap">Steamboat</div></div>
  <div><div class="tile"><img src="../assets/illustrations/trumpet.svg" alt="trumpet"></div><div class="cap">Trumpet</div></div>
  <div><div class="tile"><img src="../assets/illustrations/gas-lantern.svg" alt="lantern"></div><div class="cap">Gas Lantern</div></div>
  <div><div class="tile"><img src="../assets/illustrations/compass-rose.svg" alt="compass"></div><div class="cap">Compass Rose</div></div>
  <div><div class="tile"><img src="../assets/illustrations/king-cake.svg" alt="king cake"></div><div class="cap">King Cake</div></div>
  <div><div class="tile"><img src="../assets/illustrations/mardi-gras-mask.svg" alt="mardi gras"></div><div class="cap">Mask</div></div>
  <div><div class="tile"><img src="../assets/illustrations/streetcar-route.svg" alt="route"></div><div class="cap">Route</div></div>
  <div><div class="tile"><img src="../assets/illustrations/live-oak.svg" alt="oak"></div><div class="cap">Live Oak</div></div>
  <div><div class="tile"><img src="../assets/illustrations/magnolia.svg" alt="magnolia"></div><div class="cap">Magnolia</div></div>
  <div><div class="tile"><img src="../assets/illustrations/wrought-iron-balcony.svg" alt="balcony"></div><div class="cap">Balcony</div></div>
</div>
<div class="desc">2.4px espresso primary stroke · 1.2px brass-deep hatch · one Mardi-Gras accent max.</div>
</body></html>
