<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Type · Display</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; padding:0; background:var(--cream); }
  body { font-family: var(--font-body); color: var(--espresso); padding: 28px 36px; }
  .eyebrow { font-family: var(--font-label); font-weight:500; font-size:10px; text-transform:uppercase; letter-spacing:0.4em; color:var(--brass-deep); }
  .specimen { font-family: var(--font-display); font-weight:800; font-size:88px; line-height:0.98; color:var(--espresso); letter-spacing:0.01em; margin-top:6px; }
  .caption { font-family: var(--font-body); font-style:italic; font-weight:500; font-size:15px; color:var(--muted); margin-top:14px; }
  .meta { display:flex; gap:24px; margin-top:14px; font-family: var(--font-label); text-transform:uppercase; letter-spacing:0.28em; font-size:10px; color:var(--brass-deep); }
  .meta span b { font-family: var(--font-display); font-weight:700; color:var(--espresso); font-size:12px; letter-spacing:0.02em; margin-right:6px; text-transform:none;}
</style>
</head>
<body>
  <div class="eyebrow">Playfair Display · Display Headline</div>
  <div class="specimen">The first job is a ten-year bet.</div>
  <div class="caption">Used for headlines, chapter titles, and hero stat numerals.</div>
  <div class="meta">
    <span><b>Family</b>Playfair Display</span>
    <span><b>Weights</b>700 · 800 · 900</span>
    <span><b>Tracking</b>+0.01 → +0.025em</span>
    <span><b>Line-height</b>1.0 → 1.08</span>
  </div>
</body>
</html>
