<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Type · Italic Voice</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; padding:0; background:var(--cream); }
  body { font-family: var(--font-body); color: var(--espresso); padding: 28px 36px; }
  .eyebrow { font-family: var(--font-label); font-weight:500; font-size:10px; text-transform:uppercase; letter-spacing:0.4em; color:var(--brass-deep); }
  .pull { font-family: var(--font-body); font-style:italic; font-weight:500; font-size:42px; line-height:1.2; color:var(--burgundy); margin-top:6px; letter-spacing:0.005em; }
  .caption { font-family: var(--font-body); font-style:italic; font-weight:500; font-size:15px; color:var(--muted); margin-top:16px; }
  .meta { display:flex; gap:24px; margin-top:14px; font-family: var(--font-label); text-transform:uppercase; letter-spacing:0.28em; font-size:10px; color:var(--brass-deep); }
  .meta span b { font-family: var(--font-display); font-weight:700; color:var(--espresso); font-size:12px; letter-spacing:0.02em; margin-right:6px; text-transform:none;}
</style>
</head>
<body>
  <div class="eyebrow">Cormorant Garamond · Italic Voice</div>
  <div class="pull">And most graduates lose it.</div>
  <div class="caption">Subtitles, pull-quotes, card bodies, anything that reads in a "human voice."</div>
  <div class="meta">
    <span><b>Family</b>Cormorant Garamond</span>
    <span><b>Weight</b>500 italic</span>
    <span><b>Color</b>#5A1F2B</span>
    <span><b>Line-height</b>1.3 → 1.45</span>
  </div>
</body>
</html>
