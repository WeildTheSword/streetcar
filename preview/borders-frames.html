<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><title>Borders · Frames · Rules</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--cream);}
  body{font-family:var(--font-body);padding:22px 28px;}
  .heading{font-family:var(--font-label);font-weight:500;text-transform:uppercase;letter-spacing:0.4em;font-size:10px;color:var(--brass-deep);margin-bottom:14px;}
  .grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}
  .demo{position:relative;background:rgba(255,255,255,0.5);height:140px;}
  .demo-outer{border:1px solid var(--brass);position:absolute;inset:8px;opacity:0.55;}
  .demo-inner{border:1px solid var(--brass);position:absolute;inset:14px;opacity:0.22;}
  .demo-single{border:1px solid var(--brass);position:absolute;inset:0;}
  .demo-dashed{border-top:1px dashed rgba(184,147,90,0.5);position:absolute;top:50%;left:12px;right:12px;}
  .demo-hair{border-top:1px solid var(--brass);position:absolute;top:50%;left:12px;right:12px;opacity:0.45;}
  .label{position:absolute;top:-8px;left:50%;transform:translateX(-50%);background:var(--cream);padding:0 10px;font-family:var(--font-label);text-transform:uppercase;letter-spacing:0.35em;font-size:9px;color:var(--brass-deep);}
  .cap{font-family:var(--font-body);font-style:italic;font-size:12px;color:var(--muted);margin-top:6px;text-align:center;}
  .col{position:relative;}
</style></head><body>
<div class="heading">Borders · Playbill Frames · Rules</div>
<div class="grid">
  <div class="col">
    <div class="demo"><div class="demo-outer"></div><div class="demo-inner"></div><div class="label">Cartouche</div></div>
    <div class="cap">Double-rule playbill frame.</div>
  </div>
  <div class="col">
    <div class="demo"><div class="demo-single"></div></div>
    <div class="cap">Single 1px brass border — cards.</div>
  </div>
  <div class="col">
    <div class="demo"><div class="demo-hair"></div><div class="demo-dashed" style="top:66%"></div></div>
    <div class="cap">Hairline (solid) · Dashed (breakdowns).</div>
  </div>
</div>
</body></html>
