<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><title>Colors · Mardi Gras Accents</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--cream);}
  body{font-family:var(--font-body);padding:22px 28px;}
  .heading{font-family:var(--font-label);font-weight:500;text-transform:uppercase;letter-spacing:0.4em;font-size:10px;color:var(--brass-deep);margin-bottom:14px;}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
  .sw{border:1px solid var(--brass);background:rgba(255,255,255,0.4);padding:14px 16px;}
  .chip{width:100%;height:56px;margin-bottom:10px;}
  .name{font-family:var(--font-display);font-weight:700;font-size:16px;color:var(--espresso);}
  .sub{font-family:var(--font-body);font-style:italic;font-size:12px;color:var(--muted);margin-top:2px;}
  .hex{font-family:var(--font-label);text-transform:uppercase;letter-spacing:0.3em;font-size:10px;color:var(--brass-deep);margin-top:6px;}
  .rule{font-family:var(--font-body);font-style:italic;font-size:12px;color:var(--muted);margin-top:14px;border-top:1px solid var(--rule-soft);padding-top:10px;}
</style></head><body>
<div class="heading">Mardi Gras Accents · Illustration Only · One at a Time</div>
<div class="grid">
  <div class="sw"><div class="chip" style="background:#6B2E82"></div><div class="name">Purple</div><div class="sub">Faith — muted royal.</div><div class="hex">#6B2E82</div></div>
  <div class="sw"><div class="chip" style="background:#2F6B3E"></div><div class="name">Green</div><div class="sub">Justice — forest, not electric.</div><div class="hex">#2F6B3E</div></div>
  <div class="sw"><div class="chip" style="background:#C29A3E"></div><div class="name">Gold</div><div class="sub">Power — old brass gold.</div><div class="hex">#C29A3E</div></div>
</div>
<div class="rule">Never used in UI chrome. One accent per illustration — never all three at once.</div>
</body></html>
