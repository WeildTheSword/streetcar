<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Type · Labels</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; padding:0; background:var(--cream); }
  body { font-family: var(--font-body); color: var(--espresso); padding: 26px 36px; }
  .row { margin-bottom: 14px; }
  .row:last-child { margin-bottom: 0; }
  .ex {
    font-family: var(--font-label); font-weight:500;
    text-transform:uppercase; color:var(--brass-deep);
  }
  .xl { font-size: 20px; letter-spacing: 0.55em; }
  .lg { font-size: 14px; letter-spacing: 0.4em; }
  .md { font-size: 11px; letter-spacing: 0.35em; }
  .sm { font-size: 10px; letter-spacing: 0.3em; opacity:0.85; }
  .caption { font-family: var(--font-body); font-style:italic; font-weight:500; font-size:13px; color:var(--muted); margin-top: 4px; }
  .heading { font-family: var(--font-label); font-weight:500; text-transform:uppercase; letter-spacing:0.4em; font-size:10px; color:var(--brass-deep); margin-bottom: 16px; }
</style>
</head>
<body>
  <div class="heading">Cinzel · Small-Caps Labels</div>
  <div class="row"><div class="ex xl">Chapter One</div><div class="caption">Section headers · 20 / .55em</div></div>
  <div class="row"><div class="ex lg">The Navigator's OS</div><div class="caption">Eyebrows · 14 / .4em</div></div>
  <div class="row"><div class="ex md">NY Fed · Q4 2025</div><div class="caption">Citations · 11 / .35em</div></div>
  <div class="row"><div class="ex sm">Streetcar · The Knowledge Bank</div><div class="caption">Brand marks, page numbers · 10 / .3em</div></div>
</body>
</html>
