<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><title>Spacing</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--cream);}
  body{font-family:var(--font-body);padding:22px 28px;}
  .heading{font-family:var(--font-label);font-weight:500;text-transform:uppercase;letter-spacing:0.4em;font-size:10px;color:var(--brass-deep);margin-bottom:14px;}
  .row{display:flex;align-items:center;gap:16px;padding:4px 0;}
  .tag{font-family:var(--font-label);text-transform:uppercase;letter-spacing:0.25em;font-size:10px;color:var(--brass-deep);width:52px;}
  .val{font-family:var(--font-display);font-weight:700;font-size:12px;color:var(--espresso);width:52px;}
  .bar{background:var(--brass);height:10px;opacity:0.75;}
  .desc{font-family:var(--font-body);font-style:italic;font-size:12px;color:var(--muted);margin-left:auto;}
</style></head><body>
<div class="heading">Spacing Scale · 4px base</div>
<div class="row"><div class="tag">sp-1</div><div class="val">4 px</div><div class="bar" style="width:4px"></div><div class="desc">Hairline gaps.</div></div>
<div class="row"><div class="tag">sp-2</div><div class="val">8 px</div><div class="bar" style="width:8px"></div><div class="desc">Inline dividers.</div></div>
<div class="row"><div class="tag">sp-3</div><div class="val">12 px</div><div class="bar" style="width:12px"></div><div class="desc">Label → value.</div></div>
<div class="row"><div class="tag">sp-4</div><div class="val">16 px</div><div class="bar" style="width:16px"></div><div class="desc">Card internal rhythm.</div></div>
<div class="row"><div class="tag">sp-5</div><div class="val">24 px</div><div class="bar" style="width:24px"></div><div class="desc">Block-to-block.</div></div>
<div class="row"><div class="tag">sp-6</div><div class="val">32 px</div><div class="bar" style="width:32px"></div><div class="desc">Card padding.</div></div>
<div class="row"><div class="tag">sp-7</div><div class="val">48 px</div><div class="bar" style="width:48px"></div><div class="desc">Section-to-section.</div></div>
<div class="row"><div class="tag">sp-8</div><div class="val">64 px</div><div class="bar" style="width:64px"></div><div class="desc">Column gutters.</div></div>
<div class="row"><div class="tag">sp-9</div><div class="val">96 px</div><div class="bar" style="width:96px"></div><div class="desc">Slide outer margins.</div></div>
</body></html>
